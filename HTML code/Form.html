<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        body {

            background-color: bisque;
            margin: 20px;
        }

        h1 {
            background-color: lightslategray;

        }

        form {

            background-color: beige;
            padding: 20px;
            border-radius: 8px;
            max-width: 800px;
        }

        fieldset {

            margin-bottom: 15px;
            border: 1px solid;
            padding: 15px;
            border-radius: 5px;
        }

        legend {

            font-weight: bold;
        }

        input,
        select,
        textarea,
        button {
            width: 70%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <h1> HTML Form Elements</h1>

    <form>
        <fieldset>
            <legend>Personal Details</legend>
            <label for="fullname"> Full Name</label>
            <input type="text" name="fullname" id="full-name" required> <br />
            <label for="email"> Email</label>
            <input type="email" name="email" id="email"> <br />
            <label for="password"> Password</label>
            <input type="password" name="password" id="password"> <br />
        </fieldset>
        <fieldset>
            <legend> Address Details </legend>
            <label for="country"> Country: </label>
            <select name="country" id="country">
                <optgroup label="Gulf Countries">
                    <option value="" selected></option>
                    <option value="Saudi Arabia">Saudi Arabia</option>
                    <option value="Qatar">Qatar</option>
                </optgroup>

                <optgroup label="Arab Counrties">
                    <option value="Egypt">Egypt</option>
                    <option value="Sudan">Sudan</option>
                </optgroup>

            </select> <br />
            <label for="file"> Upload File: </label>
            <input type="file" name="file" id="file"> <br />

            <label for="supportd-browser"> Supported Browser:</label>
            <input list="browser1" id="browsers" name="browsers">
            <datalist id="browser1">
                <option value="Chrome">
                <option value="Firefox">
                <option value="Safari">
                <option value="Brave">
            </datalist> <br />
        </fieldset>
        <fieldset>
            <legend> Description Text</legend>
            <label for="description"> Description: </label>
            <textarea name="description">  </textarea> <br />
        </fieldset>
        <fieldset> 
            <legend> Buttons</legend>
        <label for="num1"> Number 1:</label>
        <input type="number" id="num1" name="num1" value="0" max="5" min="1">
        <label for="result"> Result</label>
        <output name="result">30</output> <br />
        <button type="submit">Submit</button><br /> <br />
        <button type="reset">Reset</button>
        </fieldset>
    </form>
</body>

</html>
