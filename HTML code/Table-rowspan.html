<!DOCTYPE html>
<html lang="en">
<head>

    <title>Table Colum Spam</title>
<style>
    table,td ,th{
        border: 1px solid;
        border-color: rgb(12, 12, 12);
        background-color: rgb(120, 96, 180);
        padding: 10px;
        border-collapse: collapse;
        text-align: center;

    }
</style>
</head>
<body>
    <h2>This is an HTML Table ROWS Spam </h2>
<table>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Age</th>
  </tr>
  <tr>
    <td rowspan="2">1</td>
    <td>Sarah</td>
    <td>Riyadh</td>
    <td>25</td>
  </tr>
  <tr>
    <td>Rehem</td>
    <td>Riyadh</td>
    <td>26</td>
  </tr>
</table>
</body>
</html>
